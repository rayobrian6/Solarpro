    #map { width: 100%; height: 100vh; }
    #status { position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.8); color: #fff; padding: 10px 16px; border-radius: 8px; font-family: monospace; font-size: 13px; z-index: 999; }

  <script>
    const API_KEY = 'AIzaSyBcXQC-i7s2TJz8PNOM1OhiU-sEhPR41wE';
    const status = document.getElementById('status');

    async function init() {
      try {
        status.textContent = 'Importing maps3d library...';
        const { Map3DElement, MapMode } = await google.maps.importLibrary('maps3d');
        status.textContent = 'Creating Map3DElement...';

        const map3d = new Map3DElement({
          center: { lat: 33.4484, lng: -112.0740, altitude: 0 },
          tilt: 67.5,
          heading: 0,
          range: 300,
          mode: MapMode.SATELLITE,
        });

        map3d.style.width = '100%';
        map3d.style.height = '100vh';
        document.getElementById('map').appendChild(map3d);

        map3d.addEventListener('gmp-ready', () => {
          status.style.background = 'rgba(34,197,94,0.9)';
          status.textContent = '✅ 3D Map loaded successfully!';
        });

        setTimeout(() => {
          status.style.background = 'rgba(234,179,8,0.9)';
          status.textContent = '⚠️ Timeout - map may still be loading';
        }, 8000);

      } catch(err) {
        status.style.background = 'rgba(239,68,68,0.9)';
        status.textContent = '❌ Error: ' + err.message;
        console.error(err);
      }
    }
  </script>
