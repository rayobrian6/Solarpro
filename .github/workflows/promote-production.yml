# ============================================================
# promote-production.yml — Promote Vercel Production Alias
# Runs after every push to master.
#
# Strategy:
#   1. Query latest deployment (any state)
#   2. If READY already → assign alias immediately
#   3. If BUILDING/QUEUED → poll until READY, then assign
#   4. If ERROR/CANCELED → fail the workflow
#   5. not_modified response = alias already correct = success
# ============================================================

name: Promote Production Alias

on:
  push:
    branches:
      - master

jobs:
  promote:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Wait for READY deployment and assign alias
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          PROJECT_ID: prj_1txcMFd4kjPJ3XHv5RbEaqi04MY0
          ALIAS: solarpro-v31.vercel.app
        run: |
          echo "Checking latest Vercel deployment..."
          MAX_ATTEMPTS=30
          SLEEP_SECONDS=10
          DUID=""
          STATE=""

          for i in $(seq 1 $MAX_ATTEMPTS); do
            RESPONSE=$(curl -s \
              "https://api.vercel.com/v6/deployments?projectId=$PROJECT_ID&limit=1" \
              -H "Authorization: Bearer $VERCEL_TOKEN")

            STATE=$(echo "$RESPONSE" | jq -r '.deployments[0].state')
            DUID=$(echo "$RESPONSE" | jq -r '.deployments[0].uid')
            URL=$(echo "$RESPONSE" | jq -r '.deployments[0].url')

            echo "Attempt $i/$MAX_ATTEMPTS — $DUID — State: $STATE"

            if [ "$STATE" = "READY" ]; then
              echo "Deployment READY: $DUID ($URL)"
              break
            elif [ "$STATE" = "ERROR" ] || [ "$STATE" = "CANCELED" ]; then
              echo "ERROR: Deployment in state $STATE — cannot promote."
              exit 1
            fi

            sleep $SLEEP_SECONDS
          done

          if [ "$STATE" != "READY" ]; then
            echo "ERROR: No READY deployment found after $MAX_ATTEMPTS attempts."
            exit 1
          fi

          echo "Assigning $ALIAS → $DUID ..."
          RESULT=$(curl -s -X POST \
            "https://api.vercel.com/v10/deployments/$DUID/aliases" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{&quot;alias&quot;: &quot;$ALIAS&quot;}")

          echo "Vercel response: $RESULT"

          ERR_CODE=$(echo "$RESULT" | jq -r '.error.code // empty')
          if [ -n "$ERR_CODE" ] && [ "$ERR_CODE" != "not_modified" ]; then
            echo "ERROR: $ERR_CODE"
            exit 1
          fi

          echo "SUCCESS: $ALIAS → $DUID"

      - name: Health check
        run: |
          sleep 5
          HEALTH=$(curl -s https://solarpro-v31.vercel.app/api/health)
          echo "Health: $HEALTH"
          VERSION=$(curl -s https://solarpro-v31.vercel.app/api/version | jq -r '.version')
          echo "Live version: $VERSION"
          DB_OK=$(echo "$HEALTH" | jq -r '.db.ok // false')
          if [ "$DB_OK" = "true" ]; then
            echo "All systems healthy — $VERSION is live."
          else
            echo "WARNING: DB health returned: $DB_OK"
          fi