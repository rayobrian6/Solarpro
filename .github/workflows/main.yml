# ============================================================
# main.yml — Deploy to Vercel Production (MANUAL APPROVAL REQUIRED)
#
# DEPLOYMENT RULES:
#   dev branch   → Vercel Preview build (automatic, via GitHub App + vercel.json)
#   master branch → Production (this workflow, MANUAL trigger only via workflow_dispatch)
#
# Production deployment NEVER runs automatically on push to master.
# A human must click "Run workflow" in GitHub Actions UI to promote to production.
#
# WORKFLOW TO PROMOTE DEV → PRODUCTION:
#   1. Verify dev preview URL looks correct
#   2. Go to GitHub Actions → Deploy to Vercel Production → Run workflow
#   3. Workflow merges dev → master and deploys
# ============================================================

name: Deploy to Vercel Production

on:
  # MANUAL TRIGGER ONLY — no automatic push-based production deploys
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DEPLOY to confirm production deployment'
        required: true
        default: ''

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Confirm deployment intent
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DEPLOY" ]; then
            echo "ERROR: You must type DEPLOY to confirm. Got: '${{ github.event.inputs.confirm }}'"
            exit 1
          fi
          echo "Deployment confirmed. Proceeding..."

  deploy:
    needs: guard
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Trigger Vercel production deployment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          PROJECT_ID: prj_1txcMFd4kjPJ3XHv5RbEaqi04MY0
        run: |
          echo "Triggering Vercel production deployment for master..."

          RESPONSE=$(curl -s -X POST \
            "https://api.vercel.com/v13/deployments" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              &quot;name&quot;: &quot;solarpro-v3.1&quot;,
              &quot;gitSource&quot;: {
                &quot;type&quot;: &quot;github&quot;,
                &quot;repoId&quot;: &quot;1173887298&quot;,
                &quot;ref&quot;: &quot;master&quot;
              },
              &quot;target&quot;: &quot;production&quot;
            }")

          echo "Vercel response: $RESPONSE"
          ERR=$(echo "$RESPONSE" | jq -r '.error.message // empty')
          if [ -n "$ERR" ]; then
            echo "ERROR triggering deployment: $ERR"
            exit 1
          fi
          DUID=$(echo "$RESPONSE" | jq -r '.uid // empty')
          echo "Deployment started: $DUID"

      - name: Wait for READY and assign alias
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          PROJECT_ID: prj_1txcMFd4kjPJ3XHv5RbEaqi04MY0
        run: |
          MAX_ATTEMPTS=30
          SLEEP_SECONDS=15
          DUID=""
          STATE=""

          for i in $(seq 1 $MAX_ATTEMPTS); do
            RESPONSE=$(curl -s \
              "https://api.vercel.com/v6/deployments?projectId=${PROJECT_ID}&limit=1" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}")

            STATE=$(echo "$RESPONSE" | jq -r '.deployments[0].state')
            DUID=$(echo "$RESPONSE" | jq -r '.deployments[0].uid')
            URL=$(echo "$RESPONSE"  | jq -r '.deployments[0].url')

            echo "Attempt $i/$MAX_ATTEMPTS — $DUID — State: $STATE"

            if [ "$STATE" = "READY" ]; then
              echo "Deployment READY: $DUID ($URL)"
              break
            elif [ "$STATE" = "ERROR" ] || [ "$STATE" = "CANCELED" ]; then
              echo "ERROR: Deployment failed with state: $STATE"
              exit 1
            fi
            sleep $SLEEP_SECONDS
          done

          if [ "$STATE" != "READY" ]; then
            echo "ERROR: Timed out waiting for READY deployment."
            exit 1
          fi

          echo '{"alias":"solarpro-v31.vercel.app"}' > /tmp/alias_payload.json
          RESULT=$(curl -s -X POST \
            "https://api.vercel.com/v10/deployments/${DUID}/aliases" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            -H "Content-Type: application/json" \
            --data-binary @/tmp/alias_payload.json)

          echo "Alias response: $RESULT"
          ERR_CODE=$(echo "$RESULT" | jq -r '.error.code // empty')
          if [ -n "$ERR_CODE" ] && [ "$ERR_CODE" != "not_modified" ]; then
            echo "ERROR assigning alias: $ERR_CODE"
            exit 1
          fi
          echo "SUCCESS: solarpro-v31.vercel.app → $DUID"

      - name: Health check
        run: |
          sleep 10
          VERSION=$(curl -s https://solarpro-v31.vercel.app/api/version | jq -r '.version // "unknown"')
          echo "Live version: $VERSION"
          HEALTH=$(curl -s -o /dev/null -w "%{http_code}" https://solarpro-v31.vercel.app/api/health)
          echo "Health HTTP status: $HEALTH"